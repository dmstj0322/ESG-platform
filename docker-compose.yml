services:
  # 1. 데이터베이스
  esg-mysql:
    image: mysql:8.0
    container_name: esg-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: esg_db
    volumes:
      - ./mysql_data:/var/lib/mysql

  # 2. 캐시 및 분산 락
  esg-redis:
    image: redis:latest
    container_name: esg-redis
    ports:
      - "6379:6379"

  # 3. Zookeeper (Confluent 공식 이미지)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: esg-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 4. Kafka (Confluent 공식 이미지 - 가장 안정적)
  kafka:
    image: confluentinc/cp-kafka:7.5.0 # 최신 Kraft 전용 버전 대신 안정 버전 사용
    container_name: esg-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # 추가된 안정화 설정
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
