spring:
  application:
    name: notification-service

  config:
    import: "optional:configserver:http://localhost:8888"

  profiles:
    active: default

  mvc:
    async:
      request-timeout: 3600000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
