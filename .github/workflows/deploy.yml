name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - experiment/ocr-limit

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 3
      matrix:
        service:
          - analysis-service
          - auth-service
          - community-service
          - config-service
          - eureka-service
          - gateway-service
          - market-service
          - notification-service
          - point-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🌟 수정 1: Docker Hub 로그인을 Buildx 셋업보다 위로 올렸습니다.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: esgplatform/${{ matrix.service }}:latest

  frontend-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🌟 수정 1: 프론트엔드도 로그인을 먼저 수행합니다.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./esg-platform-ui
          file: ./esg-platform-ui/Dockerfile
          push: true
          tags: esgplatform/esg-frontend:latest

  # 🌟 수정 2: 서버 2(핵심 인프라 및 MSA 코어) 배포를 먼저 수행합니다.
  deploy-server2:
    needs: [docker-build-push, frontend-build-push]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server 2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER2_HOST }}
          username: ${{ secrets.SERVER2_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/ubuntu/esg-deploy
            docker compose pull
            docker compose down
            docker compose up -d

  # 🌟 수정 2: 서버 2 배포가 완전히 끝난 뒤에 서버 1(AI 분석)을 배포합니다.
  deploy-server1:
    needs: deploy-server2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server 1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER1_HOST }}
          username: ${{ secrets.SERVER1_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/ubuntu/esg-deploy
            docker compose pull
            docker compose down
            docker compose up -d