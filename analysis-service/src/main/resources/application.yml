spring:
  application:
    name: analysis-service

  # ★ 여기에 추가 ★
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  config:
    import: "optional:configserver:http://${CONFIG_HOST:localhost}:8888"
  profiles:
    active: default

upstage:
  api:
    key: ${UPSTAGE_API_KEY:}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

app:
  gateway-url: ${API_GATEWAY_URL:http://localhost:9000}