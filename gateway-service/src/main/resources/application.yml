server:
  port: 9000

spring:
  application:
    name: gateway-service
  config:
    import: "optional:configserver:http://${CONFIG_HOST:localhost}:8888"
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://${FRONTEND_IP:localhost}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_UNIQUE
      discovery:
        locator:
          enabled: true
      httpclient:
        connect-timeout: 10000 # 연결 타임아웃을 넉넉히 설정
        response-timeout: 3600s
      routes:
        # WebSocket 전용 라우트 (JwtFilter 없이, /ws-esg/** 직접 전달)
        - id: analysis-websocket
          uri: lb://ANALYSIS-SERVICE
          predicates:
            - Path=/ws-esg/**

        # POST /analysis/report → 컨트롤러 실제 경로 /api/v1/analysis/report (와일드카드보다 먼저 등록)
        - id: analysis-report-upload
          uri: lb://ANALYSIS-SERVICE
          predicates:
            - Path=/analysis/report
            - Method=POST
          filters:
            - SetPath=/api/v1/analysis/report
            - JwtAuthFilter

        - id: analysis-service-v1
          uri: lb://ANALYSIS-SERVICE
          predicates:
            - Path=/api/v1/analysis/**
          filters:
            - JwtAuthFilter

        - id: analysis-service
          uri: lb://ANALYSIS-SERVICE
          predicates:
            - Path=/analysis/**
          filters:
            - RewritePath=/analysis/(?<segment>.*), /${segment}
            - JwtAuthFilter # 인증 추가

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /${segment}
            # 로그인은 인증 없이 들어와야 하므로 필터 제외

        - id: market-service
          uri: lb://MARKET-SERVICE
          predicates:
            - Path=/market/**
          filters:
            - RewritePath=/market/(?<segment>.*), /${segment}
            - JwtAuthFilter # 인증 추가

        - id: community-service
          uri: lb://COMMUNITY-SERVICE
          predicates:
            - Path=/community/**
          filters:
            - RewritePath=/community/(?<segment>.*), /${segment}
            - JwtAuthFilter # 인증 추가

        - id: community-admin-service
          uri: lb://COMMUNITY-SERVICE
          predicates:
            - Path=/admin/**
          filters:
            - JwtAuthFilter

        - id: point-service
          uri: lb://POINT-SERVICE
          predicates:
            - Path=/points/**
          filters:
            - JwtAuthFilter # 인증 추가

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notification, /notification/**
          filters:
            - JwtAuthFilter # 인증 추가

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5

jwt:
  secret: vms_secret_key_testing_1234567890_vms_secret_key