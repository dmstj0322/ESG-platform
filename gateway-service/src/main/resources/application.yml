server:
  port: 8000

spring:
  application:
    name: gateway-service
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
      routes:
        - id: analysis-service
          uri: lb://ANALYSIS-SERVICE
          predicates:
            - Path=/analysis/**
          filters:
            - RewritePath=/analysis/(?<segment>.*), /${segment}
            - JwtAuthFilter # 인증 추가

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /${segment}
            # 로그인은 인증 없이 들어와야 하므로 필터 제외

        - id: market-service
          uri: lb://MARKET-SERVICE
          predicates:
            - Path=/market/**
          filters:
            - RewritePath=/market/(?<segment>.*), /${segment}
            - JwtAuthFilter # 인증 추가

        - id: community-service
          uri: lb://COMMUNITY-SERVICE
          predicates:
            - Path=/community/**, /admin/**
          filters:
            - RewritePath=/community/(?<segment>.*), /${segment}
            - JwtAuthFilter # 인증 추가

        - id: point-service
          uri: lb://POINT-SERVICE
          predicates:
            - Path=/points/**
          filters:
            - JwtAuthFilter # 인증 추가

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: vms_secret_key_testing_1234567890_vms_secret_key