server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/esg_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

resilience4j:
  circuitbreaker:
    instances:
      openaiAnalysis:
        registerHealthMap: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      upstageApi:
        registerHealthMap: true
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 60000
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true

upstage:
  api:
    key: ${UPSTAGE_API_KEY}

openai:
  api:
    key: ${OPENAI_API_KEY}
    model-name: gpt-4o-mini

ollama:
  base-url: http://${OLLAMA_HOST:esg-ollama}:11434

jwt:
  secret: vms_secret_key_testing_1234567890_vms_secret_key

chroma:
  base-url: http://${CHROMA_HOST:esg-chroma}:8000
